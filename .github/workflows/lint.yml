name: Frontend Safety Check

on:
  push:
    branches: ["main"]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Download our code from GitHub
        uses: actions/checkout@v3

      - name: Step 2 - Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Step 3 - Go into Frontend and install tools
        working-directory: ./frontend
        run: npm install

      - name: Step 4 - Run ESLint to catch bugs!
        working-directory: ./frontend
        run: npm run build
